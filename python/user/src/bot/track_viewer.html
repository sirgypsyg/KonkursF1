<!DOCTYPE html>
<html>
<head>
    <title>Track Viewer - Live</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: #fff; font-family: monospace; }
        canvas { display: block; margin: 20px auto; background: #222; border: 2px solid #444; }
        #info { padding: 10px; text-align: center; }
        .legend { display: flex; justify-content: center; gap: 20px; margin: 10px; flex-wrap: wrap; }
        .legend span { display: flex; align-items: center; gap: 5px; }
        .dot { width: 10px; height: 10px; display: inline-block; }
        #car-info { background: #333; padding: 10px; margin: 10px; border-radius: 5px; }
        #car-info .speed { color: #0f0; font-size: 20px; }
        #car-info .rpm { color: #ff0; }
        #car-info .gear { color: #0ff; font-size: 24px; }
    </style>
</head>
<body>
    <div id="info">
        <h1>Track Viewer - Live</h1>
        <div class="legend">
            <span><span class="dot" style="background:#00ff00"></span> Centerline</span>
            <span><span class="dot" style="background:#ff0000"></span> Brake Points</span>
            <span><span class="dot" style="background:#ffff00"></span> Apex Points</span>
            <span><span class="dot" style="background:#0088ff"></span> Car Position</span>
        </div>
    </div>
    <canvas id="canvas"></canvas>
    <div id="car-info">
        <div>Tick: <span id="tick">0</span></div>
        <div>Speed: <span id="speed" class="speed">0</span> m/s (<span id="speed-kmh">0</span> km/h)</div>
        <div>RPM: <span id="rpm" class="rpm">0</span></div>
        <div>Gear: <span id="gear" class="gear">N</span></div>
        <div>Curvature: <span id="curvature">0</span></div>
    </div>
    <div id="stats"></div>

    <script>
        let trackData = null;
        let carPos = null;
        let minX, maxX, minZ, maxZ, scale, offsetX, offsetZ;

        function toCanvas(x, z) {
            return [x * scale + offsetX, z * scale + offsetZ];
        }

        async function loadTrack() {
            const response = await fetch('track_data.json');
            trackData = await response.json();
            
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            // Znajdź zakres
            minX = Infinity, maxX = -Infinity;
            minZ = Infinity, maxZ = -Infinity;
            
            for (const p of trackData.points) {
                minX = Math.min(minX, p.x - p.left_width);
                maxX = Math.max(maxX, p.x + p.right_width);
                minZ = Math.min(minZ, p.z - p.left_width);
                maxZ = Math.max(maxZ, p.z + p.right_width);
            }
            
            const padding = 50;
            const width = maxX - minX + padding * 2;
            const height = maxZ - minZ + padding * 2;
            
            canvas.width = Math.min(1200, width);
            canvas.height = Math.min(800, height);
            
            scale = Math.min(canvas.width / width, canvas.height / height) * 0.8;
            offsetX = (canvas.width - width * scale) / 2 - minX * scale;
            offsetZ = (canvas.height - height * scale) / 2 - minZ * scale;
            
            // Stats
            document.getElementById('stats').innerHTML = `
                <p>Map: ${trackData.map_id} | Lap: ${trackData.lap_length_m.toFixed(0)}m | Points: ${trackData.total_points} | Turns: ${trackData.turn_regions.length}
            `;
            
            drawTrack();
            loadCarPosition();
        }

        function drawTrack() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#222';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Rysuj centerline
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = 0; i < trackData.points.length; i++) {
                const p = trackData.points[i];
                const [x, z] = toCanvas(p.x, p.z);
                if (i === 0) ctx.moveTo(x, z);
                else ctx.lineTo(x, z);
            }
            ctx.stroke();
            
            // Rysuj brake points
            ctx.fillStyle = '#ff0000';
            for (const bp of trackData.break_points) {
                const [x, z] = toCanvas(bp.x, bp.z);
                ctx.beginPath();
                ctx.arc(x, z, 6, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Rysuj apex points
            ctx.fillStyle = '#ffff00';
            for (const ap of trackData.apex_points) {
                const [x, z] = toCanvas(ap.x, ap.z);
                ctx.beginPath();
                ctx.arc(x, z, 5, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Rysuj pozycję bolidu
            if (carPos) {
                const [cx, cz] = toCanvas(carPos.x, carPos.z);
                
                // Pulsujące koło
                ctx.strokeStyle = '#0088ff';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(cx, cz, 12, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.fillStyle = '#0088ff';
                ctx.beginPath();
                ctx.arc(cx, cz, 6, 0, Math.PI * 2);
                ctx.fill();
                
                // Kierunek (od środka)
                const dir = carPos.speed > 0.1 ? 15 : 0;
            }
        }

        async function loadCarPosition() {
            try {
                const response = await fetch('car_position.json');
                if (response.ok) {
                    carPos = await response.json();
                    
                    // Update info
                    document.getElementById('tick').textContent = carPos.tick;
                    document.getElementById('speed').textContent = carPos.speed.toFixed(1);
                    document.getElementById('speed-kmh').textContent = (carPos.speed * 3.6).toFixed(1);
                    document.getElementById('rpm').textContent = carPos.rpm;
                    document.getElementById('gear').textContent = carPos.gear;
                    document.getElementById('curvature').textContent = carPos.curvature.toFixed(4);
                }
            } catch (e) {
                console.log('No car position data yet');
            }
            
            drawTrack();
            
            // Odświeżaj co 500ms
            setTimeout(loadCarPosition, 500);
        }
        
        loadTrack();
    </script>
</body>
</html>
